services:
  ai-service:
    build: ./ai-service
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - chroma_data:/app/chroma_data
    expose:
      - "5000"
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      ai-service:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data

volumes:
  chroma_data:
  redis_data:
